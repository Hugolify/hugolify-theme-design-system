module:
  mounts:
    # Copy CSS and JS
    - source: assets
      target: assets

# Params
params:

  # PostCSS config
  css:
    postcss: "postcss/design-system"

  # Grid
  column: 12
  gutter: 30
  container:
    desktop: 1320
    mobile: 315

  # Load JS
  animation: false # Load js and add data attributes
  carousel: true # Load splidejs
  map: true # Load leaflet
  parallax:
    enable: false # Load js and add data attributes
    cover: -2
    heading: -0.25
    percentage: 0.5
  vimeo: false
  youtube: false

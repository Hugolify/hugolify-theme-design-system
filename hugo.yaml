module:
  mounts:
    # Copy CSS and JS
    - source: assets
      target: assets

# Params
params:

  # PostCSS config
  css:
    postcss: "postcss/design-system"

  # Grid
  column: 
    mobile: 1
    desktop: 12
  container:
    desktop: 1440
    mobile: 375
  gap:
    desktop: 30
    mobile: 30
  gutter:
    desktop: 60
    mobile: 30

  # Load JS
  animation: false # Load js and add data attributes
  carousel: true # Load splidejs
  map: true # Load leaflet
  parallax:
    enable: false # Load js and add data attributes
    cover: -2
    heading: -0.25
    percentage: 0.5
  vimeo: false
  youtube: false
